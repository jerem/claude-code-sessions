id: io.github.jerem.ClaudeCodeSessions
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: claude-code-sessions

finish-args:
  # GUI
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Read the Claude Code session logs.
  - --filesystem=~/.claude:ro
  # Run the host terminal + `claude`/`gio trash` via flatpak-spawn --host.
  # (The sandbox can't see or exec host binaries directly.)
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: claude-code-sessions
    buildsystem: simple
    build-commands:
      - install -Dm755 claude_code_sessions.py /app/bin/claude-code-sessions
      - install -Dm644 io.github.jerem.ClaudeCodeSessions.desktop
        /app/share/applications/io.github.jerem.ClaudeCodeSessions.desktop
      - install -Dm644 io.github.jerem.ClaudeCodeSessions.metainfo.xml
        /app/share/metainfo/io.github.jerem.ClaudeCodeSessions.metainfo.xml
      - install -Dm644 io.github.jerem.ClaudeCodeSessions.svg
        /app/share/icons/hicolor/scalable/apps/io.github.jerem.ClaudeCodeSessions.svg
    sources:
      - type: dir
        path: .
